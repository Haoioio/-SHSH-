        <div class="flex-column">
            <div class="flex-item">
                <input type="text" id="inp_ecid" placeholder="输入ECID">

        <h2>ECID转换</h2>
        <h5>(Hex格式(十六进制):2D13AS1SD21D21D1<br>Dec格式(十进制):123456789123455)</h5>

        <div class="flex-column" style="margin-top: 20px;">
            <div class="flex-item">
                <select id="convertType">
                    <option value="0">Hex to Dec (自动检测)</option>
                    <option value="1">Dec to Hex (自动检测)</option>
                </select>
            </div>
            <div class="flex-item">
                <input type="text" id="convert_ecid" placeholder="输入ECID进行转换">
            </div>
            <div class="flex-item">
                <button class="button" onclick="convertECID()">转换</button>
            </div>
        </div>

        <div id="conversionResultContainer" style="margin-top: 10px; display: none;">
            <label id="conversionResultTitle" style="font-weight: bold;"></label>
            <div style="display: flex; gap: 15px; margin-bottom: 10px;">
                <div>
                    <span style="font-weight: bold;">检测类型:</span>
                    <span id="detectedType"></span>
                </div>
                <div>
                    <span style="font-weight: bold;">转换模式:</span>
                    <span id="conversionMode"></span>
                </div>
            </div>
            <textarea id="conversionResult" readonly=""></textarea>
            <button class="button" onclick="copyConversionResult()">复制结果</button>
        </div>

    <script>
        var generatedUrl = '';
        
        // 检查浏览器是否支持剪贴板API
        function isClipboardSupported() {
            return 'clipboard' in navigator || 
                   ('mozClipboard' in navigator || 'webkitClipboard' in navigator);
        }
        
        function redirectToBlob() {
            var ecid = document.getElementById('inp_ecid').value.trim();
            var baseUrl = 'https://stor.tsssaver.1conan.com/shsh/';
            if (ecid) {
                var hasLetters = /[a-fA-F]/.test(ecid);
                var finalEcid = hasLetters ? hexToDec(ecid.replace(/^0x/, '')) : ecid;
                generatedUrl = baseUrl + encodeURIComponent(finalEcid);
                document.getElementById('generatedUrl').value = generatedUrl;
                document.getElementById('urlContainer').style.display = 'block';
                toggleButtons(true);
            } else {
                alert("请填写 ECID！");
            }
        }
        
        function downloadUrl() {
            var ecid = document.getElementById('inp_ecid').value.trim();
            var downloadBaseUrl = 'https://stor.tsssaver.1conan.com/shsh/download/';
            if (ecid) {
                var hasLetters = /[a-fA-F]/.test(ecid);
                var finalEcid = hasLetters ? hexToDec(ecid.replace(/^0x/, '')) : ecid;
                window.open(downloadBaseUrl + encodeURIComponent(finalEcid), '_blank');
            } else {
                alert("请填写 ECID！");
            }
        }
        
        function copyToClipboard() {
            if (isClipboardSupported()) {
                navigator.clipboard.writeText(generatedUrl).then(function() {
                    alert("URL已复制到剪贴板！");
                }).catch(function(err) {
                    fallbackCopyTextToClipboard(generatedUrl);
                    alert("URL已复制到剪贴板！");
                });
            } else {
                fallbackCopyTextToClipboard(generatedUrl);
                alert("URL已复制到剪贴板！");
            }
        }
        
        // 旧版浏览器剪贴板兼容方案
        function fallbackCopyTextToClipboard(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                var successful = document.execCommand('copy');
                var msg = successful ? 'successful' : 'unsuccessful';
                console.log('Fallback copy command was ' + msg);
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            
            document.body.removeChild(textArea);
        }
        
        function openUrl() {
            window.open(generatedUrl, '_blank');
        }
        
        // 进制检测与转换核心函数
        function detectECIDType(ecid) {
            ecid = ecid.trim().toUpperCase();
            if (/^0X[0-9A-F]+$/.test(ecid)) ecid = ecid.substr(2); // 处理0x前缀
            if (/[A-F]/.test(ecid)) return "hex";                // 包含十六进制字符
            if (/^[0-9]+$/.test(ecid)) return "dec";             // 纯数字十进制
            return null;                                          // 无法识别的格式
        }
        
        function hexToDec(hex) {
            return parseInt(hex.replace(/^0X/, ''), 16);
        }
        
        function decToHex(dec) {
            return parseInt(dec).toString(16).toUpperCase();
        }
        
        // 输入监听兼容iOS5（使用oninput属性代替addEventListener）
        document.getElementById('convert_ecid').oninput = function() {
            var ecid = this.value.trim();
            if (!ecid) return;
            
            var type = detectECIDType(ecid);
            if (type === "hex") {
                document.getElementById('convertType').value = "0";
            } else if (type === "dec") {
                document.getElementById('convertType').value = "1";
            }
        };
        
        // 转换主函数（支持自动检测+手动覆盖，移除递归调用）
        function convertECID() {
            var ecid = document.getElementById('convert_ecid').value.trim();
            if (!ecid) {
                alert("请输入ECID！");
                return;
            }
            
            var selectMode = document.getElementById('convertType').value;
            var detectedType = detectECIDType(ecid);
            var result, title, modeText, typeText;
            var isConversionValid = true;
            
            // 根据选择模式执行转换（支持手动覆盖自动检测）
            if (selectMode === "0") { // Hex to Dec
                if (detectedType !== "hex") {
                    // 手动选择Hex模式但输入非十六进制，提示并按十进制处理
                    if (confirm("检测到输入可能为十进制，是否强制按十六进制转换？")) {
                        result = hexToDec(ecid);
                    } else {
                        document.getElementById('convertType').value = "1";
                        // 非递归处理方式
                        return;
                    }
                } else {
                    result = hexToDec(ecid);
                }
                title = "十六进制转十进制结果:";
                modeText = "Hex to Dec (手动选择)";
                typeText = detectedType === "hex" ? "十六进制" : "十进制(强制转换)";
            } else { // Dec to Hex
                if (detectedType !== "dec") {
                    // 手动选择Dec模式但输入非十进制，提示并按十六进制处理
                    if (confirm("检测到输入可能为十六进制，是否强制按十进制转换？")) {
                        result = decToHex(ecid);
                    } else {
                        document.getElementById('convertType').value = "0";
                        // 非递归处理方式
                        return;
                    }
                } else {
                    result = decToHex(ecid);
                }
                title = "十进制转十六进制结果:";
                modeText = "Dec to Hex (手动选择)";
                typeText = detectedType === "dec" ? "十进制" : "十六进制(强制转换)";
            }
            
            // 显示转换结果
            document.getElementById('conversionResultTitle').innerText = title;
            document.getElementById('detectedType').innerText = typeText;
            document.getElementById('conversionMode').innerText = modeText;
            document.getElementById('conversionResult').value = result;
            document.getElementById('conversionResultContainer').style.display = 'block';
        }
        
        // 复制功能保持不变
        function copyConversionResult() {
            var result = document.getElementById('conversionResult').value;
            if (isClipboardSupported()) {
                navigator.clipboard.writeText(result).then(function() {
                    alert("转换结果已复制到剪贴板！");
                }).catch(function(err) {
                    fallbackCopyTextToClipboard(result);
                    alert("转换结果已复制到剪贴板！");
                });
            } else {
                fallbackCopyTextToClipboard(result);
                alert("转换结果已复制到剪贴板！");
            }
        }
            
        function toggleButtons(show) {
            document.getElementById('queryButton').style.display = show ? 'none' : 'inline-block';
            document.getElementById('openButton').style.display = show ? 'inline-block' : 'none';
            document.getElementById('copyButton').style.display = show ? 'inline-block' : 'none';
            document.getElementById('downloadButton').style.display = show ? 'inline-block' : 'none';
        }
    </script>

</body>
