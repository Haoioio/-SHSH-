    <script>
        // 浏览器检测与兼容性处理
        (function() {
            var userAgent = navigator.userAgent.toLowerCase();
            var isIE = userAgent.indexOf('msie') !== -1 || userAgent.indexOf('trident') !== -1;
            var isSafari = userAgent.indexOf('safari') !== -1 && userAgent.indexOf('chrome') === -1;

            );

            // 对不支持的浏览器显示警告

                isOldSafari: isOldSafari,
                supportsBlob: typeof Blob !== 'undefined',
                supportsDownloadAttribute: 'download' in document.createElement('a')
            };
        })();
        
        // 兼容性处理：为旧浏览器添加Array.prototype.forEach支持
        if (!Array.prototype.forEach) {
            Array.prototype.forEach = function(callback, thisArg) {
                for (var k = 0; k < this.length; k++) {
                    if (k in this) callback.call(thisArg, this[k], k, this);
                }
            };
        }
        
        // 核心变量
        var ecidInput = document.getElementById('ecid');
        var intecidInput = document.getElementById('intecid');
        var postModelInput = document.getElementById('post_model');

        var resultContainer = document.getElementById('resultContainer');
        var currentPageInput = document.getElementById('currentPage');
        var batchDownloadBtn, downloadProgress, progressBar, progressText;
        
        // 工具函数
        function addEvent(element, event, handler) {
            if (element.addEventListener) {
                element.addEventListener(event, handler, false);
            } else if (element.attachEvent) {
                element.attachEvent('on' + event, handler);
            } else {
                element['on' + event] = handler;
            }
        }
        
        function findParent(element, tagName) {
            tagName = tagName.toUpperCase();
            while (element && element.nodeName !== tagName) {
                element = element.parentNode;
            }
            return element;
        }
        
        // 表单提交处理
        addEvent(queryForm, 'submit', function(e) {
            if (e.preventDefault) e.preventDefault();
            else e.returnValue = false;
            
            if (!post_encrypt_data()) return;
            
            submitBtn.disabled = true;
            submitBtn.textContent = '查询中...';
            
            var formData = new FormData(queryForm);
            var xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject("Microsoft.XMLHTTP");
            xhr.open('POST', './index.php', true);
            xhr.overrideMimeType('application/json');
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '提交查询';
                    
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            resultContainer.style.display = 'block';
                            
                            if (data.success) {
                                resultContainer.innerHTML = data.content;
                                intecidInput.value = data.ecid;
                                postModelInput.value = data.model;
                                currentPageInput.value = data.current_page;
                                bindTableEvents();
                                bindBatchDownloadEvent();
                            } else {
                                resultContainer.innerHTML = '<div class="error-notification">' + data.message + '</div>';
                            }
                        } catch (e) {
                            resultContainer.innerHTML = '<div class="error-notification">解析失败: ' + (e.message || '未知错误') + '</div>';
                        }
                    } else {
                        resultContainer.innerHTML = '<div class="error-notification">查询失败，状态码: ' + xhr.status + '</div>';
                    }
                }
            };
            
            xhr.send(formData);
        });
        
        // 数据加密处理
        function post_encrypt_data() {
            var ecidInputValue = ecidInput.value.trim();
            if (!ecidInputValue) {
                alert('请输入ECID');
                return false;
            }
        
            // ECID格式转换
            var ecidHex, ecid;
            if (/^\d+$/.test(ecidInputValue)) {
                ecid = parseInt(ecidInputValue, 10);
                ecidHex = ecid.toString(16).toUpperCase();
            } else {
                ecid = parseInt(ecidInputValue, 16);
                if (isNaN(ecid)) {
                    alert('ECID格式错误，请输入有效的十进制或十六进制值');
                    return false;
                }
                ecidHex = ecidInputValue.toUpperCase();
            }
        
            var model = document.getElementById('model').value;
            var encrypt_param = encrypt_3DES(
                JSON.stringify({ecid: ecid, model: model, time: Date.now()}),
                '2015aisi1234sj7890smartflashi4pc',
                0, 1, 0
            );
        
            document.getElementById('encrypt_param').value = encrypt_param;
            document.getElementById('intecid').value = ecid;
            document.getElementById('post_model').value = model;
            return true;
        }
        
        // 获取Generator值
        function fetchGenerator(iosVersion, ecid, model, callback) {
            var encryptData = {
                ecid: parseInt(ecid, 16),
                model: model,
                time: Date.now(),
                ios: iosVersion
            };
            
            var encryptParam = encrypt_3DES(
                JSON.stringify(encryptData),
                '2015aisi1234sj7890smartflashi4pc',
                0, 1, 0
            );
            
            var proxyUrl = './api/proxy.php?url=' + encodeURIComponent(
                'https://i4tool2.i4.cn/downloadConvertSHSH.xhtml?param=' + encodeURIComponent(encryptParam)
            );
        
            var xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject("Microsoft.XMLHTTP");
            xhr.open('GET', proxyUrl);
            xhr.overrideMimeType('application/json');
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var jsonResponse = JSON.parse(xhr.responseText);
                            if (!jsonResponse.shsh) {
                                callback(new Error('服务器返回无效的SHSH数据'));
                                return;
                            }
                            
                            // 解析generator
                            var generator = '未知generator';
                            try {
                                var shshContent = jsonResponse.shsh;
                                var startIndex = shshContent.indexOf('<key>generator</key>');
                                if (startIndex !== -1) {
                                    var stringStart = shshContent.indexOf('<string>', startIndex) + 8;
                                    var stringEnd = shshContent.indexOf('</string>', stringStart);
                                    if (stringStart !== -1 && stringEnd !== -1) {
                                        generator = shshContent.substring(stringStart, stringEnd);
                                    }
                                }
                            } catch (e) {}
        
                            var downloadUrl = './api/plist.php?param=' + encodeURIComponent(encryptParam) + '&ecid=' + encodeURIComponent(ecid) + '&model=' + encodeURIComponent(model) + '&ios=' + encodeURIComponent(iosVersion);
                            var encryptedUrl = 'https://i4tool2.i4.cn/downloadConvertSHSH.xhtml?param=' + encodeURIComponent(encryptParam);
                            
                            window.shshUrls = window.shshUrls || {};
                            window.shshUrls[iosVersion] = {downloadUrl: downloadUrl, encryptedUrl: encryptedUrl, content: jsonResponse.shsh};
                            
                            callback(null, {generatorValue: generator, downloadUrl: downloadUrl, encryptedUrl: encryptedUrl, content: jsonResponse.shsh});
                        } catch (e) {
                            callback(new Error('解析失败: ' + (e.message || '未知错误')));
                        }
                    } else {
                        callback(new Error('请求失败: HTTP状态 ' + xhr.status));
                    }
                }
            };
            
            xhr.onerror = function() {
                callback(new Error('网络请求失败'));
            };
            
            xhr.send();
        }
        
        // 批量获取Generator
        function fetchAllGenerators() {
            var rows = document.getElementsByTagName('tr');
            var model = postModelInput.value;
            var ecidHex = ecidInput.value.trim();
            
            if (/^\d+$/.test(ecidHex)) {
                ecidHex = parseInt(ecidHex, 10).toString(16).toUpperCase();
            }
            
            [].forEach.call(rows, function(row) {
                var iosVersion = row.getAttribute('data-ios-version');
                if (!iosVersion) return;
                
                var genCell = row.querySelector('.gen-value');
                if (!genCell) return;
                
                fetchGenerator(iosVersion, ecidHex, model, function(error, result) {
                    if (error) {
                        genCell.innerHTML = '<span class="gen-error">获取失败: ' + error.message + '</span>';
                    } else {
                        genCell.innerHTML = result.generatorValue;
                        row.setAttribute('data-download-url', result.downloadUrl);
                        row.setAttribute('data-encrypted-url', result.encryptedUrl);
                        row.setAttribute('data-shsh-content', result.content);
                    }
                });
            });
        }
        
        // 切换分页
        function changePage(page) {
            currentPageInput.value = page;
            if (queryForm.dispatchEvent) {
                var event = new Event('submit');
                queryForm.dispatchEvent(event);
            } else {
                queryForm.fireEvent('onsubmit');
            }
        }
        
        // 表格事件绑定
        function bindTableEvents() {
            // 下载按钮与版本号点击（点击整个iOS版本单元格都能触发）
            var table = document.querySelector('.result-table');
            if (table) {
                addEvent(table, 'click', function(e) {
                    var target = e.target || e.srcElement;
                    if (target.classList.contains('version-btn')) {
                        var row = findParent(target, 'tr');
                        if (row) {
                            var version = target.getAttribute('data-version');
                            var downloadUrl = row.getAttribute('data-download-url');
                            downloadSHSH(version, downloadUrl);
                        }
                    } else if (target.closest('.ios-version-cell')) {
                        // 点击iOS版本单元格内任意元素（版本号/编译号）都能打开源文件
                        var row = findParent(target, 'tr');
                        if (row) {
                            var url = row.getAttribute('data-encrypted-url');
                            if (url) {
                                var newWindow = window.open(url, '_blank');
                                if (!newWindow) {
                                    alert('浏览器阻止了弹出窗口，请允许弹出窗口后重试');
                                }
                            }
                        }
                    }
                });
            }
            
            // 分页按钮
            var pagination = document.querySelector('.pagination');
            if (pagination) {
                addEvent(pagination, 'click', function(e) {
                    var target = e.target || e.srcElement;
                    if (target.classList.contains('page-btn') && !target.classList.contains('disabled')) {
                        var page = target.getAttribute('data-page');
                        if (page) changePage(page);
                    }
                });
            }
            
            fetchAllGenerators();
        }
        
        // 绑定批量下载事件
        function bindBatchDownloadEvent() {
            batchDownloadBtn = document.getElementById('batchDownloadBtn');
            downloadProgress = document.getElementById('downloadProgress');
            progressBar = document.querySelector('.progress-bar');
            progressText = document.querySelector('.progress-text');
            
            if (batchDownloadBtn) {
                addEvent(batchDownloadBtn, 'click', function() {
                    downloadProgress.style.display = 'block';
                    progressBar.style.width = '0%';
                    progressText.textContent = '准备中...';
                    batchDownloadBtn.disabled = true;
                    downloadAllSHSH();
                });
            }
        }
        
        // 批量下载所有SHSH
        function downloadAllSHSH() {
            var totalPagesText = document.querySelector('.current-page-info').textContent;
            var totalPagesMatch = totalPagesText.match(/第 \d+ \/ (\d+) 页/);
            var totalPages = totalPagesMatch ? parseInt(totalPagesMatch[1]) : 1;
            
            var allIosVersions = [];
            var model = postModelInput.value;
            var ecidHex = ecidInput.value.trim();
            
            if (/^\d+$/.test(ecidHex)) {
                ecidHex = parseInt(ecidHex, 10).toString(16).toUpperCase();
            }
            
            var zip = new JSZip();
            var completedCount = 0;
            
            // 递归获取所有页面数据
            function fetchPageData(page) {
                progressText.textContent = '正在加载第 ' + page + '/' + totalPages + ' 页数据...';
                
                var originalPage = parseInt(currentPageInput.value);
                currentPageInput.value = page;
                
                var formData = new FormData(queryForm);
                var xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject("Microsoft.XMLHTTP");
                xhr.open('POST', './index.php', true);
                xhr.overrideMimeType('application/json');
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            
                            if (data.success && data.valid_items && data.valid_items.length > 0) {
                                allIosVersions = allIosVersions.concat(data.valid_items);
                            }
                            
                            if (page >= totalPages) {
                                progressText.textContent = '发现 ' + allIosVersions.length + ' 个SHSH文件，开始下载...';
                                progressBar.style.width = '30%';
                                currentPageInput.value = originalPage;
                                downloadAllVersions();
                            } else {
                                fetchPageData(page + 1);
                            }
                        } catch (e) {
                            alert('获取第 ' + page + ' 页数据失败: ' + e.message);
                            resetDownloadUI();
                        }
                    } else if (xhr.readyState === 4) {
                        alert('获取第 ' + page + ' 页数据失败，状态码: ' + xhr.status);
                        resetDownloadUI();
                    }
                };
                
                xhr.send(formData);
            }
            
            // 下载所有版本的SHSH
            function downloadAllVersions() {
                if (allIosVersions.length === 0) {
                    alert('没有找到可下载的SHSH文件');
                    resetDownloadUI();
                    return;
                }
                
                allIosVersions.forEach(function(version) {
            fetchGenerator(version, ecidHex, model, function(error, result) {
        completedCount++;
        var progress = 30 + Math.round((completedCount / allIosVersions.length) * 70);
        progressBar.style.width = progress + '%';
        progressText.textContent = '正在下载: ' + completedCount + '/' + allIosVersions.length;
        
        if (!error && result && result.content) {
            // 解析版本号和编译号（支持 "5.0.1 (9A405)" 和 "5.0.1/9A405" 两种格式）
            let versionNumber = version;
            let buildNumber = '';
            const versionMatch = version.match(/^([\d.]+)\s*[\/(]\s*([\w\d]+)\s*[)]?$/);
            
            if (versionMatch) {
                versionNumber = versionMatch[1]; // 提取主版本号（如5.0.1）
                buildNumber = versionMatch[2];   // 提取编译号（如9A405）
            }
            
            // 清理特殊字符，确保文件名合法
            const safeEcid = ecidHex.replace(/[^a-zA-Z0-9]/g, '');
            const safeModel = model.replace(/[^a-zA-Z0-9,_-]/g, '');
            const safeVersion = versionNumber.replace(/[^a-zA-Z0-9.]/g, '');
            const safeBuild = buildNumber.replace(/[^a-zA-Z0-9]/g, '');
            
            // 构建最终文件名（格式：ECID_设备型号_版本号_编译号.plist）
            let fileName = `${safeEcid}_${safeModel}_${safeVersion}`;
            // 如果有编译号则添加，否则只保留到版本号
            if (safeBuild) {
                fileName += `_${safeBuild}`;
            }
            fileName += '.plist';
            
            zip.file(fileName, result.content);
        }
        
        if (completedCount === allIosVersions.length) {
            generateAndDownloadZip(zip, ecidHex, model);
        }
            });
        });
            }
            
            fetchPageData(1);
        }
        
        // 生成并下载ZIP文件
        function generateAndDownloadZip(zip, ecid, model) {
            var zipName = 'SHSH2_' + ecid + '_' + model + '_' + new Date().getTime() + '.zip';
            
            if (Object.keys(zip.files).length === 0) {
                alert('没有成功获取到任何SHSH文件，无法生成ZIP包');
                resetDownloadUI();
                return;
            }
            
            progressText.textContent = '正在生成ZIP文件...';
            
            if (window.browserInfo.isOldSafari) {
                zip.generateAsync({type: "base64"}, function(metadata) {
                    var percent = Math.round(metadata.percent);
                    progressBar.style.width = percent + '%';
                    progressText.textContent = '正在生成ZIP: ' + percent + '%';
                }).then(function(content) {
                    var a = document.createElement("a");
                    a.href = "data:application/zip;base64," + content;
                    a.target = "_blank";
                    if (window.browserInfo.supportsDownloadAttribute) a.download = zipName;
                    
                    document.body.appendChild(a);
                    a.click ? a.click() : (function(a) {
                        var evt = document.createEvent('MouseEvents');
                        evt.initMouseEvent('click', true, true, window, 0, 0, 0, 0, 0, false, false, false, false, 0, null);
                        a.dispatchEvent(evt);
                    })(a);
                    
                    document.body.removeChild(a);
                    progressText.textContent = '下载完成!';
                    setTimeout(resetDownloadUI, 2000);
                }).catch(function(error) {
                    alert('ZIP生成失败: ' + (error.message || '未知错误'));
                    resetDownloadUI();
                });
            } else {
                zip.generateAsync({type: "blob"}, function(metadata) {
                    var percent = Math.round(metadata.percent);
                    progressBar.style.width = percent + '%';
                    progressText.textContent = '正在生成ZIP: ' + percent + '%';
                }).then(function(content) {
                    var a = document.createElement("a");
                    var url = URL.createObjectURL(content);
                    a.href = url;
                    if (window.browserInfo.supportsDownloadAttribute) a.download = zipName;
                    
                    document.body.appendChild(a);
                    a.click ? a.click() : (function(a) {
                        var evt = document.createEvent('MouseEvents');
                        evt.initMouseEvent('click', true, true, window, 0, 0, 0, 0, 0, false, false, false, false, 0, null);
                        a.dispatchEvent(evt);
                    })(a);
                    
                    setTimeout(function() {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 100);
                    
                    progressText.textContent = '下载完成!';
                    setTimeout(resetDownloadUI, 2000);
                }).catch(function(error) {
                    alert('ZIP生成失败: ' + (error.message || '未知错误'));
                    resetDownloadUI();
                });
            }
        }
        
        // 重置下载UI状态
        function resetDownloadUI() {
            if (batchDownloadBtn) batchDownloadBtn.disabled = false;
            if (downloadProgress) downloadProgress.style.display = 'none';
            if (progressBar) progressBar.style.width = '0%';
            if (progressText) progressText.textContent = '准备中...';
        }
        
        // 下载单个SHSH文件
        function downloadSHSH(version, downloadUrl) {
            if (!downloadUrl) {
                alert('下载链接获取失败，请稍后重试');
                return;
            }
            
            // 32位设备判断（A6及以下处理器设备）
            const model = postModelInput.value;
            const is32BitDevice = [
                // iPhone
                'iPhone1,1', 'iPhone1,2', 
                'iPhone2,1', 
                'iPhone3,1', 'iPhone3,2', 'iPhone3,3',
                'iPhone4,1',
                'iPhone5,1', 'iPhone5,2', 'iPhone5,3', 'iPhone5,4',
                
                // iPad
                'iPad1,1',
                'iPod2,1',
                'iPod3,1',
                'iPod4,1',
                'iPod5,1',
                
                // Apple TV
                'AppleTV2,1',
                'AppleTV3,1', 'AppleTV3,2'
            ].includes(model);
        
            if (is32BitDevice) {
                alert('注意：32位设备（A6及以下处理器）的SHSH文件需要修复后才能使用');
            }
            
            if (window.browserInfo.isSafari || window.browserInfo.isIE) {
                var iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = downloadUrl;
                document.body.appendChild(iframe);
                setTimeout(function() { document.body.removeChild(iframe); }, 3000);
            } else {
                var a = document.createElement("a");
                a.href = downloadUrl;
                a.download = ecidInput.value.trim() + '_' + postModelInput.value + '_' + version.replace(/\s+/g, '_') + '.plist';
                document.body.appendChild(a);
                a.click ? a.click() : (function(a) {
                    var evt = document.createEvent('MouseEvents');
                    evt.initMouseEvent('click', true, true, window, 0, 0, 0, 0, 0, false, false, false, false, 0, null);
                    a.dispatchEvent(evt);
                })(a);
                document.body.removeChild(a);
            }
        }
        
        // 初始绑定
        bindTableEvents();
        bindBatchDownloadEvent();
    </script>
